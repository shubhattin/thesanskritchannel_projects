name: Site Checks

on:
  push:
    paths:
      - 'site/**'
      - 'data/**'
      - 'src/server/text_loader.ts'
      - 'src/state/**'
      - 'src/db/**'
      - '.github/workflows/site_checks.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'data/**'
      - 'src/server/text_loader.ts'
      - 'src/state/**'
      - 'src/db/**'
      - '.github/workflows/site_checks.yml'

jobs:
  tests_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Sync root app
        run: bun run sync

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Run site tests
        working-directory: site
        run: bun x vitest run

      - name: Build site
        working-directory: site
        run: bun run build
