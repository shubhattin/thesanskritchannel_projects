name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'redirect/**'
      - 'package.json'
      - 'bun.lock'
      - 'data/**' # sub to *_map.json changes
      - '.github/workflows/deploy_redirect.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Sync app
        working-directory: app
        run: bun run sync
      
      - name: Sync site
        working-directory: site
        run: npx astro sync

      # Vercel project Root Directory is `redirect`: run CLI from repo root or path becomes redirect/redirect.
      - name: Pull Vercel env (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel env pull redirect/.env.production.local --environment=production --token="$VERCEL_TOKEN" --yes

      - name: Build (Vercel)
        working-directory: redirect
        env:
          BUILD_MODE: vercel
        run: bun run build

      - name: Deploy to Vercel
        working-directory: redirect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes
        if: success()
