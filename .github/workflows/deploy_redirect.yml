name: Deploy Redirect to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'redirect/**'
      - 'data/**'
      - 'site/src/utils/text-routes.ts'
      - 'app/src/state/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy_redirect.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `vercel build` auto-detects `bun.lock` and spawns `bun` directly.
      # In Actions, that child process can miss the setup-bun PATH entry, so
      # expose `bun` on a standard system path.
      - name: Expose bun for Vercel CLI
        run: |
          BUN_BIN="$(command -v bun)"
          echo "bun=$BUN_BIN"
          test -n "$BUN_BIN"
          sudo ln -sf "$BUN_BIN" /usr/local/bin/bun
          /usr/local/bin/bun --version

      - name: Install monorepo dependencies
        run: bun install --frozen-lockfile

      - name: Sync SvelteKit (app)
        working-directory: app
        run: bun run sync

      - name: Sync Astro (site)
        working-directory: site
        run: bunx astro sync

      - name: Pull Vercel env (production)
        working-directory: redirect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel env pull .env.production.local --environment=production --token="$VERCEL_TOKEN" --yes

      - name: Pull Vercel project settings
        working-directory: redirect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel pull --environment=production --token="$VERCEL_TOKEN" --yes

      - name: Build (Vercel prebuilt output)
        working-directory: redirect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel build --prod --token="$VERCEL_TOKEN" --yes

      - name: Deploy to Vercel
        if: success()
        working-directory: redirect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REDIRECT_PROJECT_ID }}
        run: bunx vercel deploy --prebuilt --archive=tgz --prod --token="$VERCEL_TOKEN" --yes
