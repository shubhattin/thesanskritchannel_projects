name: App Checks

on:
  push:
    paths:
      - 'app/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/checks.yml'

env:
  PUBLIC_BETTER_AUTH_URL: http://localhost:3000
  PG_DATABASE_URL: postgresql://postgres:examplepassword123abc@127.0.0.1:5432/exampledb
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Sync SvelteKit
        working-directory: app
        run: bun run sync
      - run: |
          cd app
          bunx vitest run

  svelte_and_type_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - run: |
          cd app
          bun run check
          bun run build
