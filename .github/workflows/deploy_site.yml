name: Deploy Site to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**' # map changes
      - 'app/src/server/**'
      - 'app/src/state/**'
      - 'app/src/db/**'
      # Markdown utilities
      - 'app/src/lib/carta_markdown/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy_site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Sync app
        working-directory: app
        run: bun run sync

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Pull Vercel env (production)
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SITE_PROJECT_ID }}
        run: bunx vercel env pull .env.production.local --environment=production --token="$VERCEL_TOKEN" --yes

      - name: Build (Vercel prebuilt output)
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SITE_PROJECT_ID }}
        run: bunx vercel build --prod --token="$VERCEL_TOKEN" --yes

      - name: Deploy to Vercel
        if: success()
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SITE_PROJECT_ID }}
        run: bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes
